name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write # push branches so Claude can open PRs
      pull-requests: write # open/update pull requests
      issues: write # comment on the triggering issue
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Run on Opus 4.8, and allow the project's build/verify tooling
          # (npm typecheck/lint/test/build/dev, node screenshot scripts, python golden dumps)
          # so Claude can verify its changes instead of being blocked on tool approval.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(python3:*),Bash(gh:*)"

      # The action pushes Claude's work to a branch and only leaves a "Create PR"
      # link — it never opens the PR itself, so a run that doesn't voluntarily call
      # `gh pr create` (non-deterministic) leaves the change stranded on a branch.
      # This step makes PR creation deterministic for issue-triggered runs: if Claude
      # created a branch, open a PR for it (unless one already exists).
      - name: Open PR for issue-triggered changes
        if: ${{ github.event_name == 'issues' && steps.claude.outputs.branch_name != '' }}
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          owner="${REPO%%/*}"
          # Don't open a duplicate if a PR for this branch already exists (any state).
          existing=$(gh api "repos/$REPO/pulls?head=$owner:$BRANCH&state=all" --jq 'length' || echo 0)
          if [ "$existing" -gt 0 ]; then
            echo "A PR for $BRANCH already exists; nothing to do."
            exit 0
          fi
          # Create the PR. A 422 (e.g. no commits between the branch and main) is
          # treated as a no-op so a question-only run never fails the job.
          if gh api -X POST "repos/$REPO/pulls" \
               -f title="Fix #$ISSUE_NUMBER: $ISSUE_TITLE" \
               -f head="$BRANCH" \
               -f base=main \
               -f body="Automated PR for the changes Claude pushed in response to issue #$ISSUE_NUMBER. Closes #$ISSUE_NUMBER"; then
            echo "Opened a PR for $BRANCH."
          else
            echo "::notice::Could not auto-open a PR for $BRANCH (likely no commits between it and main). The branch is pushed and can be opened manually."
          fi

